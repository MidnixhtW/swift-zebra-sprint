<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2f3a1f" />
    <title>Offline • Nepsis Shield</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #1b2113;
        color: #f1e8c8;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      main {
        width: min(36rem, calc(100% - 2rem));
        border: 1px solid rgba(208, 176, 99, .35);
        border-radius: 1.5rem;
        background: rgba(47, 58, 31, .7);
        padding: 1.5rem;
        box-shadow: 0 1.5rem 4rem rgba(0,0,0,.35);
      }
      h1 { margin: .75rem 0 .5rem; font-size: 1.6rem; }
      p { line-height: 1.6; color: rgba(241,232,200,.78); }
      .badge { display: inline-flex; border: 1px solid rgba(208,176,99,.4); border-radius: 999px; padding: .35rem .7rem; font-size: .75rem; letter-spacing: .12em; text-transform: uppercase; }
      a { color: #d0b063; }
    </style>
  </head>
  <body>
    <main>
      <div class="badge">Field mode offline</div>
      <h1>Nepsis Shield is offline.</h1>
      <p>The app shell and core field pages are cached when available. Reconnect to refresh readings, saints, external source links, and APK download status.</p>
      <p><a href="/today">Try opening the app again</a></p>
    </main>
  </body>
</html>
