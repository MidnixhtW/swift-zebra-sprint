name: Publish Android Release

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: Mark GitHub release as prerelease
        required: true
        default: true
        type: boolean

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-android-apk:
    name: Build Android release files
    runs-on: ubuntu-latest

    permissions:
      contents: read
    env:
      VITE_APK_VERSION: V${{ github.run_number }}
      VITE_APK_RELEASE_DATE: ${{ github.run_started_at }}

      ANDROID_VERSION_CODE: ${{ github.run_number }}
      ANDROID_VERSION_NAME: V${{ github.run_number }}
      ANDROID_APP_NAME: Ortho Companion
      SIGNING_READY: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
          check-latest: true
          package-manager-cache: false

      - name: Verify Node.js tool versions
        run: |
          node --version
          npm --version

      - name: Set build timestamp
        run: echo "VITE_APK_RELEASE_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Verify Java and Android SDK
        run: |
          set -euo pipefail
          java -version
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(command -v sdkmanager)"
          fi
          set +o pipefail
          yes | "$SDKMANAGER" --licenses >/dev/null
          set -o pipefail
          "$SDKMANAGER" --install "platform-tools" "platforms;android-36" "build-tools;36.0.0"
          "$SDKMANAGER" --list_installed

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        env:
          VITE_DISABLE_NITRO: "1"
        run: npm run build

      - name: Generate Android project
        run: |

          rm -rf android
          npx capacitor add android
          printf "sdk.dir=%s\n" "$ANDROID_HOME" > android/local.properties

      - name: Sync Capacitor Android assets
        run: npx capacitor sync android

      - name: Patch Android package metadata
        run: npm run android:patch-build

      - name: Apply OCP Orthodox launcher icon
        run: npm run android:apply-icon

      - name: Build debug APK
        working-directory: android
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx3g
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew --version | tee ../gradle-debug-build.log
          ./gradlew --no-daemon clean assembleDebug --stacktrace --info --warning-mode all 2>&1 | tee -a ../gradle-debug-build.log

      - name: Print Gradle diagnostics on failure
        if: failure()
        run: |
          echo "Gradle failed. Printing useful diagnostics..."
          if [ -f gradle-debug-build.log ]; then
            echo "::group::Last 220 lines from Gradle output"
            tail -n 220 gradle-debug-build.log || true
            echo "::endgroup::"
          fi

          find android -maxdepth 8 -path "*/build/reports/*" -type f -print || true

          find android -maxdepth 8 -path "*/build/reports/*" -type f \( -name "*.txt" -o -name "*.xml" -o -name "*.html" \) -print0 | while IFS= read -r -d '' file; do
            echo "::group::$file"
            sed -n '1,220p' "$file" || true
            echo "::endgroup::"
          done
          find android -path "*/build/outputs/logs/*" -type f -print0 | while IFS= read -r -d '' file; do
            echo "::group::$file"
            sed -n '1,220p' "$file" || true
            echo "::endgroup::"
          done

      - name: Upload Gradle failure log
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: gradle-debug-build-log
          path: gradle-debug-build.log
          if-no-files-found: ignore

      - name: Build unsigned release APK and AAB
        working-directory: android

        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx3g
        run: ./gradlew --no-daemon assembleRelease bundleRelease --stacktrace --info --warning-mode all

      - name: Sign release APK with Android SDK tools
        if: env.SIGNING_READY == 'true'

        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p signing
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > signing/release.keystore

          unsigned_apk="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          aligned_apk="android/app/build/outputs/apk/release/app-release-aligned.apk"
          signed_apk="android/app/build/outputs/apk/release/app-release-signed.apk"

          build_tools_dir="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort | tail -n 1)"
          "$build_tools_dir/zipalign" -p -f 4 "$unsigned_apk" "$aligned_apk"
          "$build_tools_dir/apksigner" sign \
            --ks signing/release.keystore \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass "pass:$ANDROID_KEYSTORE_PASSWORD" \
            --key-pass "pass:$ANDROID_KEY_PASSWORD" \
            --out "$signed_apk" \
            "$aligned_apk"
          "$build_tools_dir/apksigner" verify "$signed_apk"
          rm -f signing/release.keystore

      - name: Sign Play Store AAB with Java tools
        if: env.SIGNING_READY == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p signing
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > signing/release.keystore

          unsigned_aab="android/app/build/outputs/bundle/release/app-release.aab"
          signed_aab="android/app/build/outputs/bundle/release/app-release-signed.aab"

          jarsigner \
            -keystore signing/release.keystore \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -keypass "$ANDROID_KEY_PASSWORD" \
            -signedjar "$signed_aab" \
            "$unsigned_aab" \
            "$ANDROID_KEY_ALIAS"
          jarsigner -verify -certs "$signed_aab"

          rm -f signing/release.keystore

      - name: Collect Android release files
        run: |
          mkdir -p release-files
          cp android/app/build/outputs/apk/debug/app-debug.apk release-files/ortho-companion-V${{ github.run_number }}-debug.apk
          if [ -f android/app/build/outputs/apk/release/app-release-signed.apk ]; then
            cp android/app/build/outputs/apk/release/app-release-signed.apk release-files/ortho-companion-V${{ github.run_number }}-signed-release.apk
          else
            cp android/app/build/outputs/apk/release/app-release-unsigned.apk release-files/ortho-companion-V${{ github.run_number }}-unsigned-release.apk
          fi
          if [ -f android/app/build/outputs/bundle/release/app-release-signed.aab ]; then
            cp android/app/build/outputs/bundle/release/app-release-signed.aab release-files/ortho-companion-V${{ github.run_number }}-play-store.aab
          else
            cp android/app/build/outputs/bundle/release/app-release.aab release-files/ortho-companion-V${{ github.run_number }}-unsigned-play-store.aab
          fi

      - name: Upload release build artifact
        uses: actions/upload-artifact@v6
        with:
          name: ortho-companion-V${{ github.run_number }}-android-files
          path: release-files/*
          if-no-files-found: error

  publish-github-release:
    name: Publish GitHub release
    needs: build-android-apk

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release build artifact
        uses: actions/download-artifact@v7
        with:
          name: ortho-companion-V${{ github.run_number }}-android-files
          path: release-files

      - name: Publish GitHub release

        env:
          GH_TOKEN: ${{ github.token }}

          IS_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          cat > release-notes.md <<'EOF'
          ## Ortho Companion V${{ github.run_number }}

          Android release files for testing, distribution, and Play Console upload.

          - Debug APK is for testing.
          - Signed release APK is included when signing secrets are configured.
          - Play Store AAB is included for Google Play Console upload when signing secrets are configured.
          - Unsigned APK/AAB files are included only when signing secrets are missing and are not ready for public distribution.

          Configure the deployed app with:
          - VITE_APK_VERSION=V${{ github.run_number }}
          - VITE_APK_RELEASE_DATE=${{ github.run_started_at }}
          - VITE_APK_DOWNLOAD_URL=(direct APK asset URL after release publish)
          - VITE_AAB_DOWNLOAD_URL=(direct AAB asset URL after release publish)
          - VITE_APK_ARTIFACTS_URL=(this release page URL)
          EOF

          release_args=(
            "V${{ github.run_number }}"
            release-files/*
            --repo "${{ github.repository }}"
            --title "Ortho Companion V${{ github.run_number }}"
            --notes-file release-notes.md
          )

          if [ "$IS_PRERELEASE" = "true" ]; then
            release_args+=(--prerelease)
          fi
          gh release create "${release_args[@]}"
