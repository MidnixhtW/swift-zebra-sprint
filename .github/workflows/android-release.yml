name: Publish Android APK Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 1.0.0
        required: true
        default: 1.0.0
      prerelease:
        description: Mark GitHub release as prerelease
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  publish-android-apk:
    name: Build and publish APK release
    runs-on: ubuntu-latest
    env:
      VITE_APK_VERSION: ${{ inputs.version }}
      VITE_APK_RELEASE_DATE: ${{ github.run_started_at }}
      SIGNING_READY: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          check-latest: true

      - name: Verify Node.js version
        run: |
          node --version
          npm --version

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Generate Android project
        run: npx capacitor add android

      - name: Sync Capacitor Android assets
        run: npx capacitor sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Build unsigned release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Sign release APK
        if: env.SIGNING_READY == 'true'
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Collect APK files
        run: |
          mkdir -p release-files
          cp android/app/build/outputs/apk/debug/app-debug.apk release-files/ortho-companion-${{ inputs.version }}-debug.apk
          if [ -n "${{ steps.sign_app.outputs.signedReleaseFile }}" ]; then
            cp "${{ steps.sign_app.outputs.signedReleaseFile }}" release-files/ortho-companion-${{ inputs.version }}-signed-release.apk
          else
            cp android/app/build/outputs/apk/release/app-release-unsigned.apk release-files/ortho-companion-${{ inputs.version }}-unsigned-release.apk
          fi

      - name: Upload release build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ortho-companion-${{ inputs.version }}-apk-files
          path: release-files/*.apk
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Ortho Companion v${{ inputs.version }}
          prerelease: ${{ inputs.prerelease }}
          files: release-files/*.apk
          body: |
            ## Ortho Companion v${{ inputs.version }}

            Android APK release for testing and distribution.

            - Debug APK is for testing.
            - Signed release APK is included when signing secrets are configured.
            - Unsigned release APK is included only when signing secrets are missing.

            Configure the deployed app with:
            - VITE_APK_VERSION=${{ inputs.version }}
            - VITE_APK_RELEASE_DATE=${{ github.run_started_at }}
            - VITE_APK_DOWNLOAD_URL=(direct APK asset URL after release publish)
            - VITE_APK_ARTIFACTS_URL=(this release page URL)
