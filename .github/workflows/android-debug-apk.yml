name: Build Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VITE_GITHUB_REPOSITORY: ${{ github.repository }}
      VITE_APK_VERSION: V${{ github.run_number }}
      VITE_APK_RELEASE_DATE: ${{ github.run_started_at }}
      ANDROID_VERSION_CODE: ${{ github.run_number }}
      ANDROID_VERSION_NAME: V${{ github.run_number }}
      ANDROID_APP_NAME: Ortho Companion

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
          check-latest: true
          package-manager-cache: false

      - name: Verify Node.js tool versions
        run: |
          node --version
          npm --version

      - name: Set build timestamp
        run: echo "VITE_APK_RELEASE_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Verify Java and Android SDK
        run: |
          set -euo pipefail
          java -version
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(command -v sdkmanager)"
          fi
          set +o pipefail
          yes | "$SDKMANAGER" --licenses >/dev/null
          set -o pipefail
          "$SDKMANAGER" --install "platform-tools" "build-tools;36.0.0" "platforms;android-36"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Generate Android project
        run: |
          rm -rf android
          npx capacitor add android

      - name: Sync Capacitor Android assets
        run: npx capacitor sync android

      - name: Patch Android package metadata
        run: npm run android:patch-build

      - name: Apply OCP Orthodox launcher icon
        run: npm run android:apply-icon

      - name: Build debug APK
        working-directory: android
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx3g
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew --version
          ./gradlew --no-daemon clean assembleDebug --stacktrace --warning-mode all

      - name: Print Gradle diagnostics on failure
        if: failure()
        run: |
          echo "Gradle failed. Printing useful diagnostics..."

          find android -maxdepth 8 -path "*/build/reports/*" -type f -print || true
          find android -maxdepth 8 -path "*/build/reports/*" -type f \( -name "*.txt" -o -name "*.xml" -o -name "*.html" \) -print0 | while IFS= read -r -d '' file; do
            echo "::group::$file"
            sed -n '1,220p' "$file" || true
            echo "::endgroup::"
          done
          find android -path "*/build/outputs/logs/*" -type f -print0 | while IFS= read -r -d '' file; do
            echo "::group::$file"
            sed -n '1,220p' "$file" || true
            echo "::endgroup::"
          done

      - name: Prepare APK files
        run: |
          mkdir -p release-files
          cp android/app/build/outputs/apk/debug/app-debug.apk release-files/ortho-companion-latest-debug.apk
          cp android/app/build/outputs/apk/debug/app-debug.apk release-files/ortho-companion-debug-${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: ortho-companion-debug-apk
          path: release-files/*.apk
          if-no-files-found: error

  publish-debug-release:
    name: Publish rolling debug release
    needs: build-android-debug-apk
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    permissions:
      contents: write

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v7
        with:
          name: ortho-companion-debug-apk
          path: release-files

      - name: Publish rolling GitHub release
        env:
          GH_TOKEN: ${{ github.token }}

        run: |
          cat > release-notes.md <<'EOF'
          ## Latest debug APK

          This release is updated automatically from the latest successful Android debug build.

          Direct APK URL:
          https://github.com/${{ github.repository }}/releases/download/android-debug-latest/ortho-companion-latest-debug.apk

          Build metadata:
          - Commit: ${{ github.sha }}
          - Run: ${{ github.run_number }}
          - Built at: ${{ github.run_started_at }}

          This is a debug APK intended for testing and sideload installation.
          EOF

          if gh release view android-debug-latest --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release edit android-debug-latest \
              --repo "${{ github.repository }}" \
              --title "Ortho Companion Latest Debug APK" \
              --notes-file release-notes.md \
              --prerelease
          else
            gh release create android-debug-latest \
              --repo "${{ github.repository }}" \
              --title "Ortho Companion Latest Debug APK" \
              --notes-file release-notes.md \
              --prerelease
          fi

          gh release upload android-debug-latest release-files/*.apk --repo "${{ github.repository }}" --clobber
