name: Build Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-android-debug-apk:
    name: Build and publish downloadable debug APK
    runs-on: ubuntu-latest
    env:
      VITE_GITHUB_REPOSITORY: ${{ github.repository }}
      VITE_APK_VERSION: debug-${{ github.run_number }}
      VITE_APK_RELEASE_DATE: ${{ github.run_started_at }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          check-latest: true

      - name: Verify Node.js version
        run: |
          node --version
          npm --version

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Generate Android project
        run: npx capacitor add android

      - name: Sync Capacitor Android assets
        run: npx capacitor sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Prepare APK files
        run: |
          mkdir -p release-files
          cp android/app/build/outputs/apk/debug/app-debug.apk release-files/ortho-companion-latest-debug.apk
          cp android/app/build/outputs/apk/debug/app-debug.apk release-files/ortho-companion-debug-${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ortho-companion-debug-apk
          path: release-files/*.apk
          if-no-files-found: error

      - name: Publish rolling GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > release-notes.md <<'EOF'
          ## Latest debug APK

          This release is updated automatically from the latest successful Android debug build.

          Direct APK URL:
          https://github.com/${{ github.repository }}/releases/download/android-debug-latest/ortho-companion-latest-debug.apk

          Build metadata:
          - Commit: ${{ github.sha }}
          - Run: ${{ github.run_number }}
          - Built at: ${{ github.run_started_at }}

          This is a debug APK intended for testing and sideload installation.
          EOF

          if gh release view android-debug-latest >/dev/null 2>&1; then
            gh release edit android-debug-latest \
              --title "Ortho Companion Latest Debug APK" \
              --notes-file release-notes.md \
              --prerelease
          else
            gh release create android-debug-latest \
              --title "Ortho Companion Latest Debug APK" \
              --notes-file release-notes.md \
              --prerelease
          fi

          gh release upload android-debug-latest release-files/*.apk --clobber
